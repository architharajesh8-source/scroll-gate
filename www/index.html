<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Gate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="quiz-container">
        <div class="app-header">
            <h1>Welcome to Scroll Gate</h1>
            <p>Let's turn your doom-scrolling time into goal progress.</p>
        </div>

        <div class="quiz-card">
            <h3>Step 1: What is your main focus right now?</h3>
            <p class="subtitle">(e.g., lose weight, learn about chairs, build an app)</p>
            <input type="text" id="goal-input" placeholder="Type your goal here..." oninput="saveUserGoal(this.value)">
        </div>

        <div class="quiz-card">
            <h3>Step 2: What usually stops you when you try to work on it?</h3>
            <div class="quiz-options">
                <button onclick="selectAnswer(2, 'A')">A) I overthink it and want it to be perfect first</button>
                <button onclick="selectAnswer(2, 'B')">B) I get distracted easily by notifications and apps</button>
            </div>
        </div>

        <button class="primary-btn" onclick="handleNextQuestion()">Generate My Feed ➔</button>
    </div>


    <div id="feed-container" style="display: none;">
        <div class="feed-header">
            <h2>Scroll Gate Feed</h2>
            <div class="active-goal-badge">
                Target: <span id="current-user-goal">Loading your goal...</span>
            </div>
        </div>

        <div id="video-stream"></div>
    </div>

    <script src="app.js"></script>
    <script src="QuizScreen.js"></script>
    <script src="VideoPost.js"></script>
</body>
</html>
