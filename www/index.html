<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ScrollGate</title>
    <style>
        /* Baseline App Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #fff; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- SCREEN 1: THE QUIZ DESIGN --- */
        #quiz-screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; background: linear-gradient(135deg, #111 0%, #222 100%); }
        .quiz-card { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; text-align: center; }
        .quiz-title { font-size: 24px; font-weight: 700; margin-bottom: 15px; color: #00f2fe; }
        .quiz-question { font-size: 18px; margin-bottom: 25px; line-height: 1.4; }
        .option-btn { width: 100%; padding: 14px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.1); border: none; border-radius: 8px; color: #fff; font-size: 16px; cursor: pointer; transition: background 0.2s; text-align: left; }
        .option-btn:hover { background: rgba(0, 242, 254, 0.2); }

        /* --- SCREEN 2: THE VERTICAL FEED DESIGN --- */
        #feed-screen { width: 100%; height: 100%; position: relative; }
        .feed-container { width: 100%; height: 100%; overflow-y: scroll; snap-type: y mandatory; scroll-behavior: smooth; }
        .feed-container::-webkit-scrollbar { display: none; } /* Hide layout clutter */
        
        .video-post { width: 100%; height: 100%; snap-align: start; position: relative; background: #111; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay UI Elements over Video */
        .video-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); pointer-events: none; }
        .creator-tag { font-weight: 700; margin-bottom: 8px; font-size: 16px; }
        .video-desc { font-size: 14px; opacity: 0.9; margin-bottom: 40px; line-height: 1.3; }
        .action-steps { background: rgba(0, 242, 254, 0.2); border-left: 4px solid #00f2fe; padding: 10px; border-radius: 4px; margin-top: 8px; font-size: 13px; font-weight: 600; }

        /* Sidebar Actions Interaction Row */
        .sidebar-actions { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .action-icon { width: 45px; height: 45px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <!-- SCREEN 1: DIAGNOSTIC QUIZ -->
    <div id="quiz-screen">
        <div class="quiz-card">
            <div class="quiz-title">ScrollGate</div>
            <div id="question-text" class="quiz-question">Loading your onboarding map...</div>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- SCREEN 2: DOOM-SCROLL REPLACEMENT FEED -->
    <div id="feed-screen" class="hidden">
        <div class="feed-container" id="video-feed">
            <!-- Dynamic Video Posts will inject here via script -->
        </div>
    </div>

   <script type="module" src="app.js"></script>
</body>
</html>
